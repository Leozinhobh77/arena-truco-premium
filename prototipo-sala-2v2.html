<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena Truco — Sala 2v2 (Protótipo Design v5.0)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Cores */
      --obsidian-900: #0a081e;
      --obsidian-800: rgba(10, 8, 30, 0.9);
      --obsidian-700: rgba(30, 20, 60, 0.95);
      --gold-400: #d4a017;
      --gold-500: #f5c518;
      --gold-gradient: linear-gradient(135deg, #f5c518, #d4a017);
      --emerald: #2dc653;
      --ruby: #e63946;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --border-subtle: rgba(255, 255, 255, 0.08);

      /* Layout */
      --placar-padding: 8px 12px;
      --mesa-size: 300px;
      --mesa-color: #2d5a3d;
      --tentos-size: 48px;
      --tentos-font-size: 36px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--obsidian-900);
      color: var(--text-primary);
      overflow: hidden;
    }

    .game-room {
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--obsidian-900);
      position: relative;
    }

    /* ======= PLACAR ======= */
    .placar-header {
      background: var(--obsidian-800);
      border-bottom: 2px solid var(--gold-400);
      padding: 12px 0;
      flex-shrink: 0;
    }

    .placar-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      margin: 0 16px;
      overflow: hidden;
    }

    .placar-header-cell {
      background: var(--obsidian-900);
      padding: 8px;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-right: 1px solid var(--border-subtle);
    }

    .placar-header-cell:last-child {
      border-right: none;
    }

    .placar-row {
      display: contents;
    }

    .placar-cell {
      background: var(--obsidian-900);
      padding: 10px 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      border-right: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }

    .placar-cell:last-child {
      border-right: none;
    }

    .placar-cell.team-indicator {
      font-size: 18px;
    }

    .placar-cell.rodada-container {
      display: flex;
      gap: 4px;
      justify-content: center;
      align-items: center;
    }

    .placar-dot {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      background: transparent;
    }

    .placar-dot.filled {
      background: var(--gold-400);
    }

    .placar-cell.tentos-highlight {
      background: rgba(212, 160, 23, 0.1);
      font-size: 36px;
      font-weight: 900;
      color: var(--gold-400);
      padding: 12px 8px;
    }

    .placar-cell.tentos-empty {
      color: var(--text-muted);
    }

    /* Time Color Indicators */
    .color-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
    }

    .color-dot.azul {
      background: #3b82f6;
    }

    .color-dot.vermelho {
      background: var(--ruby);
    }

    /* ======= MESA ======= */
    .mesa-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px 16px;
    }

    .mesa-verde {
      width: var(--mesa-size);
      height: var(--mesa-size);
      background: var(--mesa-color);
      border: 2px solid #1a3a28;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5), 0 4px 12px rgba(0, 0, 0, 0.3);
      margin-bottom: 40px;
    }

    .mesa-texture {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      border-radius: 6px;
      pointer-events: none;
    }

    .baralho {
      width: 50px;
      height: 75px;
      background: linear-gradient(135deg, #1a1040 0%, #0f0f1a 100%);
      border: 1.5px solid var(--gold-400);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--gold-400);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    /* Player Slots */
    .player-slots {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .player-slot {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .player-slot.top-left {
      top: 10px;
      left: 20px;
    }

    .player-slot.top-right {
      top: 10px;
      right: 20px;
    }

    .player-slot.bottom-left {
      bottom: 10px;
      left: 20px;
    }

    .player-slot.bottom-right {
      bottom: 10px;
      right: 20px;
    }

    .player-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid var(--border-subtle);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .player-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      max-width: 60px;
      word-break: break-word;
    }

    /* Suas Cartas */
    .suas-cartas {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .carta {
      width: 45px;
      height: 67px;
      background: linear-gradient(135deg, #1a1040 0%, #0f0f1a 100%);
      border: 1px solid rgba(212, 160, 23, 0.4);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold-500);
    }

    /* ======= CHAT RODAPÉ ======= */
    .chat-footer {
      background: var(--obsidian-900);
      border-top: 1px solid var(--border-subtle);
      padding: 12px 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-controls {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .btn-control {
      padding: 6px 12px;
      font-size: 12px;
      background: transparent;
      border: 1px solid var(--text-secondary);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .btn-control:hover {
      background: rgba(212, 160, 23, 0.1);
      border-color: var(--gold-400);
      color: var(--gold-400);
    }

    .chat-container {
      background: var(--obsidian-800);
      border: 1px solid var(--border-subtle);
      border-bottom: 2px solid var(--gold-400);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 100px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      font-size: 12px;
    }

    .chat-message {
      display: flex;
      gap: 6px;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .chat-author {
      font-weight: 700;
      color: var(--gold-400);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      gap: 6px;
      padding: 6px 8px;
      border-top: 1px solid var(--border-subtle);
      background: var(--obsidian-900);
    }

    .chat-input {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      color: var(--text-primary);
      outline: none;
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      padding: 4px 8px;
      font-size: 12px;
      background: var(--gold-gradient);
      color: var(--obsidian-900);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.2s;
    }

    .btn-send:active {
      transform: scale(0.95);
    }

    /* ======= RESPONSIVIDADE ======= */
    @media (max-width: 480px) {
      :root {
        --mesa-size: 260px;
        --tentos-font-size: 32px;
      }

      .placar-cell {
        font-size: 12px;
        padding: 8px 4px;
      }

      .placar-header-cell {
        font-size: 9px;
        padding: 6px;
      }

      .mesa-container {
        padding: 30px 8px;
      }

      .player-slot.top-left,
      .player-slot.top-right {
        top: 5px;
      }

      .player-slot.bottom-left,
      .player-slot.bottom-right {
        bottom: 5px;
      }

      .player-slot.top-left,
      .player-slot.bottom-left {
        left: 10px;
      }

      .player-slot.top-right,
      .player-slot.bottom-right {
        right: 10px;
      }

      .player-avatar {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--gold-400);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="game-room">
    <!-- PLACAR HEADER -->
    <div class="placar-header">
      <div class="placar-container">
        <!-- Headers -->
        <div class="placar-header-cell">Time</div>
        <div class="placar-header-cell">Rodada</div>
        <div class="placar-header-cell">Pontos</div>
        <div class="placar-header-cell">Tentos</div>
        <div class="placar-header-cell">Jogos</div>

        <!-- Time Azul -->
        <div class="placar-row">
          <div class="placar-cell team-indicator">
            <div class="color-dot azul"></div>
          </div>
          <div class="placar-cell rodada-container">
            <div class="placar-dot filled"></div>
            <div class="placar-dot filled"></div>
            <div class="placar-dot"></div>
          </div>
          <div class="placar-cell">0</div>
          <div class="placar-cell tentos-highlight">2</div>
          <div class="placar-cell">0</div>
        </div>

        <!-- Time Vermelho -->
        <div class="placar-row">
          <div class="placar-cell team-indicator">
            <div class="color-dot vermelho"></div>
          </div>
          <div class="placar-cell rodada-container">
            <div class="placar-dot filled"></div>
            <div class="placar-dot"></div>
            <div class="placar-dot"></div>
          </div>
          <div class="placar-cell">0</div>
          <div class="placar-cell tentos-empty">—</div>
          <div class="placar-cell">0</div>
        </div>
      </div>
    </div>

    <!-- MESA DE JOGO -->
    <div class="mesa-container">
      <div class="mesa-verde">
        <div class="mesa-texture"></div>
        <div class="baralho">🃏</div>

        <!-- Player Slots -->
        <div class="player-slots">
          <div class="player-slot top-left">
            <div class="player-avatar">👤</div>
            <div class="player-name">ALEX</div>
          </div>

          <div class="player-slot top-right">
            <div class="player-avatar">👩</div>
            <div class="player-name">MORENA</div>
          </div>

          <div class="player-slot bottom-left">
            <div class="player-avatar">👨</div>
            <div class="player-name">LEO</div>
          </div>

          <div class="player-slot bottom-right">
            <div class="player-avatar">👩</div>
            <div class="player-name">BRUN</div>
          </div>
        </div>
      </div>

      <!-- Suas Cartas -->
      <div class="suas-cartas">
        <div class="carta">4♠</div>
        <div class="carta">3♥</div>
        <div class="carta">Q♦</div>
      </div>
    </div>

    <!-- CHAT FOOTER -->
    <div class="chat-footer">
      <div class="chat-controls">
        <button class="btn-control">⬆️ EXPANDIR</button>
        <button class="btn-control">💬</button>
        <button class="btn-control">🔊</button>
        <button class="btn-control">× SAIR</button>
      </div>

      <div class="chat-container">
        <div class="chat-messages">
          <div class="chat-message">
            <span class="chat-author">MORENA:</span>
            <span>Vou colocar uma carta aí! 🎴</span>
          </div>
          <div class="chat-message">
            <span class="chat-author">VOCÊ:</span>
            <span>Bora! Dá uma boa carta! 😎</span>
          </div>
          <div class="chat-message">
            <span class="chat-author">ALEX:</span>
            <span>Boa jogada! 👏👏</span>
          </div>
          <div class="chat-message">
            <span class="chat-author">BRUN:</span>
            <span>Eita, essa foi pesada! 💪</span>
          </div>
        </div>

        <div class="chat-input-row">
          <input
            type="text"
            class="chat-input"
            placeholder="Escreva uma msg..."
          />
          <button class="btn-send">→</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Interatividade simples do chat
    const input = document.querySelector('.chat-input');
    const sendBtn = document.querySelector('.btn-send');
    const chatMessages = document.querySelector('.chat-messages');

    sendBtn.addEventListener('click', () => {
      if (input.value.trim()) {
        const msg = document.createElement('div');
        msg.className = 'chat-message';
        msg.innerHTML = `<span class="chat-author">VOCÊ:</span> <span>${input.value}</span>`;
        chatMessages.appendChild(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        input.value = '';
      }
    });

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendBtn.click();
      }
    });
  </script>
</body>
</html>
